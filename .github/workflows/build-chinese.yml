name: Build Chinese PDF

on:
  push:
    branches: [zh-cn]
  pull_request:
    branches: [zh-cn]
  workflow_dispatch:

jobs:
  # 质量检查
  quality:
    name: Quality Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install pyyaml

      - name: Check terminology consistency
        run: python .translate-engine/scripts/check_terms.py --config config.yaml --terms terms.yaml
        continue-on-error: false

      - name: Check translation progress
        run: python .translate-engine/scripts/check_progress.py --config config.yaml

  # 构建
  build:
    name: Build PDF
    needs: quality
    runs-on: ubuntu-latest
    container:
      image: akiyks/perfbook-build:latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Install CJK fonts and XeLaTeX
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            texlive-xetex \
            fonts-noto-cjk \
            tex-gyre \
            poppler-utils \
            texlive-latex-extra \
            texlive-fonts-recommended \
            wget \
            unzip

      - name: Install latexpand from CTAN
        run: |
          cd /tmp
          wget -q https://mirrors.ctan.org/support/latexpand/latexpand-1.3.zip
          unzip -q latexpand-1.3.zip
          cp latexpand-1.3/latexpand /usr/local/bin/
          chmod +x /usr/local/bin/latexpand
          latexpand --version || echo "latexpand installed"

      - name: Install steel-city-comic font
        run: |
          mkdir -p /usr/local/share/fonts/
          cp fonts/steel-city-comic.regular.ttf /usr/local/share/fonts/ 2>/dev/null || true

      - name: Build code samples
        run: |
          make -C CodeSamples/ pthreads 2>/dev/null || true
          make -C CodeSamples/ 2>/dev/null || true

      - name: Build all PDF variants
        run: |
          make perfbook.pdf || true
          make perfbook-1c.pdf || true
          make perfbook-lt.pdf || true
          make perfbook-a4.pdf || true
          make perfbook-eb.pdf || true
          make perfbook-hb.pdf || true

      - name: Rename PDFs with _cn suffix
        run: |
          for f in perfbook*.pdf; do
            [ -f "$f" ] && mv "$f" "${f%.pdf}_cn.pdf"
          done

      - name: Verify PDFs
        run: |
          echo "=== Built PDFs ==="
          ls -lh *.pdf 2>/dev/null || echo "No PDFs found"
          for f in *_cn.pdf; do
            [ -f "$f" ] && pages=$(pdfinfo "$f" 2>/dev/null | grep Pages | awk '{print $2}') && echo "$f: $pages pages"
          done

      - name: Upload PDF artifacts
        uses: actions/upload-artifact@v4
        with:
          name: perfbook-chinese
          path: "*_cn.pdf"
          retention-days: 30
