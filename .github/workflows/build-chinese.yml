name: Build Chinese PDF

on:
  push:
    branches: [zh-cn]
  pull_request:
    branches: [zh-cn]
  workflow_dispatch:

jobs:
  # 质量检查
  quality:
    name: Quality Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          submodules: true
          fetch-depth: 0

      - name: Initialize submodules
        run: |
          git submodule init
          git submodule update --recursive
          ls -la .translate-engine/ || echo "Submodule not found"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install pyyaml

      - name: Check terminology consistency
        run: python .translate-engine/scripts/check_terms.py --config config.yaml --terms terms.yaml || echo "⚠️ Terminology issues found (non-blocking)"
        continue-on-error: true

      - name: Check translation progress
        run: python .translate-engine/scripts/check_progress.py --config config.yaml

  # 构建
  build:
    name: Build PDF
    needs: quality
    runs-on: ubuntu-latest
    container:
      image: akiyks/perfbook-build:latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          submodules: true
          fetch-depth: 0

      - name: Initialize submodules
        run: |
          git submodule init
          git submodule update --recursive

      - name: Configure git safe directory
        run: git config --global --add safe.directory /__w/perfbook_cn/perfbook_cn

      - name: Install CJK fonts and XeLaTeX
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            texlive-xetex \
            texlive-lang-chinese \
            fonts-noto-cjk \
            tex-gyre \
            poppler-utils \
            texlive-latex-extra \
            texlive-fonts-recommended

      - name: Install ctex package via tlmgr
        run: |
          tlmgr install ctex || true
          kpsewhich ctexhook.sty || echo "ctexhook.sty not found"

      - name: Verify latexpand
        run: |
          which latexpand || echo "latexpand not found"
          latexpand --version || echo "latexpand version check failed"

      - name: Install steel-city-comic font
        run: |
          mkdir -p /usr/local/share/fonts/
          cp fonts/steel-city-comic.regular.ttf /usr/local/share/fonts/ 2>/dev/null || true

      - name: Build code samples
        run: |
          make -C CodeSamples/ pthreads 2>/dev/null || true
          make -C CodeSamples/ 2>/dev/null || true

      - name: Build all PDF variants
        continue-on-error: true
        run: |
          make perfbook.pdf || true
          make perfbook-1c.pdf || true
          make perfbook-lt.pdf || true
          make perfbook-a4.pdf || true
          make perfbook-eb.pdf || true
          make perfbook-hb.pdf || true
          echo "Built PDFs:"
          ls -la *.pdf 2>/dev/null || echo "No PDFs generated"

      - name: Rename PDFs with _cn suffix
        run: |
          for f in perfbook*.pdf; do
            if [ -f "$f" ]; then
              mv "$f" "${f%.pdf}_cn.pdf"
              echo "Renamed: $f -> ${f%.pdf}_cn.pdf"
            fi
          done
          echo "PDF files:"
          ls -la *.pdf 2>/dev/null || echo "No PDF files found"

      - name: Verify PDFs
        run: |
          echo "=== Built PDFs ==="
          ls -lh *.pdf 2>/dev/null || echo "No PDFs found"
          for f in *_cn.pdf; do
            [ -f "$f" ] && pages=$(pdfinfo "$f" 2>/dev/null | grep Pages | awk '{print $2}') && echo "$f: $pages pages"
          done

      - name: Upload PDF artifacts
        uses: actions/upload-artifact@v5
        if: always()
        with:
          name: perfbook-chinese
          path: "*_cn.pdf"
          retention-days: 30
          if-no-files-found: warn
