name: Build English PDF

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  # 质量检查
  quality:
    name: Quality Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          submodules: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install pyyaml

      - name: Check translation progress
        run: python .translate-engine/scripts/check_progress.py --config config.yaml
        continue-on-error: true

  # 构建
  build:
    name: Build PDF
    needs: quality
    runs-on: ubuntu-latest
    container:
      image: akiyks/perfbook-build:latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          submodules: true

      - name: Install additional dependencies
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            poppler-utils \
            texlive-latex-extra \
            texlive-fonts-recommended

      - name: Verify latexpand
        run: |
          which latexpand || echo "latexpand not found"
          latexpand --version || echo "latexpand version check failed"

      - name: Install steel-city-comic font
        run: |
          mkdir -p /usr/local/share/fonts/
          cp fonts/steel-city-comic.regular.ttf /usr/local/share/fonts/ 2>/dev/null || true

      - name: Build code samples
        run: |
          make -C CodeSamples/ pthreads 2>/dev/null || true
          make -C CodeSamples/ 2>/dev/null || true

      - name: Test code samples
        run: make -C CodeSamples/ check 2>/dev/null || true

      - name: Build all PDF variants
        run: |
          make perfbook.pdf || true
          make perfbook-1c.pdf || true
          make perfbook-lt.pdf || true
          make perfbook-a4.pdf || true
          make perfbook-eb.pdf || true
          make perfbook-hb.pdf || true

      - name: Verify PDFs
        run: |
          echo "=== Built PDFs ==="
          ls -lh *.pdf 2>/dev/null || echo "No PDFs found"
          for f in perfbook*.pdf; do
            [ -f "$f" ] && pages=$(pdfinfo "$f" 2>/dev/null | grep Pages | awk '{print $2}') && echo "$f: $pages pages"
          done

      - name: Upload PDF artifacts
        uses: actions/upload-artifact@v5
        with:
          name: perfbook-english
          path: "perfbook*.pdf"
          retention-days: 30
